    /*
      # Functions:
        - A set/block of code which is intended to perform a particular task.
        - Functions can be executed as many number of times as needed.
        - advantages of functions:
          - Avoid repetition of code (redundancy)
            - DRY (Don't Repeat Yourself) principle.
          - Makes code more organized and modular.
          
        - For any function to be executed in JS, it needs two setups:
          - Declaration/definition
          - Invocation/calling

        - Type of function:
          - Standard function 
          - Anonymous function 
            - Does not have a name
            - Used as a function expression
          - Arrow function

        - Syntax:
          - Declaration
            function functionName(parameters) {
              // code to be executed
            }
            ANONYMOUS FUNCTION
            const functionName = function(parameters) {
              // code to be executed
            }
          - Invocation
            functionName(arguments)

        - Parameters and arguments:
          - Can make a function dynamic (for different inputs, you get different outputs)
          - Parameters: function variables (Values expected by the function)
          - Arguments: actual values passed to the function when invoking it.
          - Syntax:
            - Declaration:
              function fun1(a, b) { // a and b are parameters
              // code
              }
              Invokation:
              fun1(10, 20) // 10 and 20 are arguments
        -  'return' keyword:
           - Return a value at the place where the function was invoked
           - Terminates the function execution at the point where return keyword was used.
    */
